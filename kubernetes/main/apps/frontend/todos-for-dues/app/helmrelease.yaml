---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app todos-for-dues
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      main:
        replicas: 1
        strategy: RollingUpdate
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          # 1. Create the app's database + role inside cluster16 if they
          #    don't exist. Idempotent. Uses the home-operations
          #    postgres-init image (same pattern as authentik/paperless).
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: "18.3"
              pullPolicy: IfNotPresent
            envFrom:
              - secretRef:
                  name: todos-for-dues-secret
          # 2. Apply Drizzle migrations + seed chapter_settings from the
          #    BOOTSTRAP_* env vars (PLAN-002 tsx wrapper at
          #    packages/db/src/scripts/migrate.ts → set_config() into
          #    app.bootstrap_* GUCs before drizzle migrate).
          migrate:
            image: &mainImage
              repository: ghcr.io/thaynes43/todos-for-dues
              tag: v0.6.0
              pullPolicy: IfNotPresent
            command:
              - tsx
              - /migrator/src/scripts/migrate.ts
            envFrom:
              - secretRef:
                  name: todos-for-dues-secret
        containers:
          app:
            image: *mainImage
            env:
              NODE_ENV: production
              PORT: "3000"
              HOSTNAME: "0.0.0.0"
              # The cluster has no IPv6 egress to the internet. Node 18+'s
              # built-in fetch (undici) does Happy Eyeballs and tries IPv6
              # first by default — Google's OAuth endpoints return both
              # AAAA and A records, so the OIDC token exchange was timing
              # out with ETIMEDOUT before the IPv4 fallback finished. This
              # forces the system resolver to return IPv4 addresses first.
              NODE_OPTIONS: --dns-result-order=ipv4first
              # Resend FROM address. Must be on a domain whose SPF + DKIM
              # records have been added in the Resend dashboard. The
              # SaaS-repo default (`noreply@todos-for-dues.app`) is a
              # placeholder; without this override Resend rejects every
              # send with "domain is not verified". `sigoalumni.org` is
              # this chapter's verified sending domain.
              RESEND_FROM_ADDRESS: "TODOs for Dues <noreply@sigoalumni.org>"
            envFrom:
              - secretRef:
                  name: todos-for-dues-secret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 3000
                  initialDelaySeconds: 15
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 3000
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 3000
                  initialDelaySeconds: 5
                  periodSeconds: 5
                  timeoutSeconds: 3
                  failureThreshold: 24
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 1Gi
    service:
      main:
        ports:
          http:
            port: 3000
