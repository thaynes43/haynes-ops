---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: headlamp
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: headlamp
    template:
      engineVersion: v2
      data:
        # The Headlamp chart uses envFrom when config.oidc.externalSecret.enabled=true
        # and expects these env var keys to exist in the referenced Secret.
        OIDC_CLIENT_ID: "{{ .OIDC_CLIENT_ID }}"
        OIDC_CLIENT_SECRET: "{{ .OIDC_CLIENT_SECRET }}"
        OIDC_ISSUER_URL: "{{ .OIDC_ISSUER_URL }}"
        # Required by the chart's args wiring when using externalSecret.
        # Keep Headlamp defaults: openid,profile,email
        OIDC_SCOPES: "openid,profile,email"
        # Headlamp needs the callback URL registered with the OIDC provider.
        OIDC_CALLBACK_URL: "https://headlamp.haynesops.com/oidc-callback"
  dataFrom:
    - extract:
        # 1Password item/vault key name
        # Expected fields: client_id, client_secret, issuer_url
        key: headlamp
