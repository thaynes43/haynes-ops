---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: headlamp
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    fullnameOverride: headlamp
    replicaCount: 1
    config:
      watchPlugins: true
      # Headlamp still expects an explicit kubeconfig file in some modes/versions.
      # We generate it in an initContainer and point Headlamp at it.
      extraArgs:
        - -kubeconfig=/home/headlamp/.config/Headlamp/kubeconfigs/config
    ingress:
      enabled: false
    httpRoute:
      enabled: false
    service:
      port: 80
    serviceAccount:
      create: true
    clusterRoleBinding:
      create: true
    podSecurityContext:
      # Ensure emptyDir mounts under /home/headlamp are writable
      # for the non-root headlamp user/group (100/101).
      fsGroup: 101
    podAnnotations:
      reloader.stakater.com/auto: "true"
    # Workaround for https://github.com/kubernetes-sigs/headlamp/issues/1826: Headlamp expects
    # a kubeconfig file and does not yet use in-cluster config. This initContainer builds a
    # kubeconfig from the pod's ServiceAccount token only (no OIDC). Cluster OIDC for user
    # kubectl is unrelated; optional Headlamp OIDC (config.oidc) is for UI sign-in per docs.
    initContainers:
      - command:
          - /bin/sh
          - "-c"
          - |
            kubectl config set-cluster main --server=https://kubernetes.default.svc --certificate-authority=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
            kubectl config set-credentials main --token=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
            kubectl config set-context main --cluster=main --user=main
            kubectl config use-context main
        env:
          - name: KUBERNETES_SERVICE_PORT
            value: "6443"
          - name: KUBECONFIG
            value: /home/headlamp/.config/Headlamp/kubeconfigs/config
        image: alpine/kubectl:1.36.0
        name: create-kubeconfig
        securityContext:
          capabilities:
            drop:
              - ALL
          privileged: false
          readOnlyRootFilesystem: true
          runAsGroup: 101
          runAsNonRoot: true
          runAsUser: 100
        volumeMounts:
          - mountPath: /home/headlamp/.config/Headlamp
            name: kubeconfig
            readOnly: false
    volumeMounts:
      - mountPath: /home/headlamp/.config/Headlamp
        name: kubeconfig
        readOnly: false
    volumes:
      - name: kubeconfig
        emptyDir: {}
    pluginsManager:
      enabled: true
      configContent: |
        plugins:
          - name: flux
            source: https://artifacthub.io/packages/headlamp/headlamp-plugins/headlamp_flux
            version: 0.5.0
          - name: cert-manager
            source: https://artifacthub.io/packages/headlamp/headlamp-plugins/headlamp_cert-manager
            version: 0.1.0
