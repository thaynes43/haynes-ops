---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./helmrelease.yaml
  - ./pvc.yaml
  - ./ingressroute.yaml
  - ./externalsecret.yaml
components:
  - ../../../../../shared/components/common/repos/app-template
  - ../../../../../shared/components/common/gatus/guarded
configMapGenerator:
  - name: comfyui-configmap
    options:
      annotations:
        kustomize.toolkit.fluxcd.io/substitute: disabled
    files:
      - config.ini=./resources/config.ini
      - provisioning.sh=./resources/provisioning.sh
      - models.txt=./resources/models.txt
  - name: comfyui-workflows
    options:
      annotations:
        kustomize.toolkit.fluxcd.io/substitute: disabled
    files:
      - ./resources/workflows/02_qwen_Image_edit_subgraphed.json
      - ./resources/workflows/image_qwen_Image_2512.json
generatorOptions:
  disableNameSuffixHash: true
