apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: tautulli
  annotations:
    external-dns.alpha.kubernetes.io/target: ingress-ext.haynesnetwork.com
    kubernetes.io/ingress.class: traefik-external
    gethomepage.dev/href: "https://tautulli.haynesnetwork.com"
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Media
    gethomepage.dev/name: Tautulli
    gethomepage.dev/description: Plex monitoring dashboard
    gethomepage.dev/icon: tautulli
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`tautulli.haynesnetwork.com`) && PathPrefix(`/`)
      services:
        - kind: Service
          name: haynestower
          port: 8181
      middlewares:
        - name: default-headers
  tls:
    secretName: certificate-haynesnetwork