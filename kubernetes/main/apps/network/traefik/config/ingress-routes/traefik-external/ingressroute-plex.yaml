apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: plex
  annotations:
    external-dns.alpha.kubernetes.io/target: ingress-ext.haynesnetwork.com
    kubernetes.io/ingress.class: traefik-external
    gethomepage.dev/href: "https://plex.haynesnetwork.com"
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Media
    gethomepage.dev/name: Plex (External)
    gethomepage.dev/description: Media server
    gethomepage.dev/icon: plex
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`plex.haynesnetwork.com`) && PathPrefix(`/`)
      services:
        - kind: Service
          name: haynestower
          port: 32400
      middlewares:
        - name: default-headers
  tls:
    secretName: certificate-haynesnetwork