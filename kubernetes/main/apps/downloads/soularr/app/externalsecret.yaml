---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: soularr
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: soularr-secret
    template:
      engineVersion: v2
      data:
        # Full config.ini rendered with the API keys from 1Password.
        # download_dir under [Lidarr] and [Slskd] are the SAME physical
        # directory (NAS data/soulseek/complete) seen from each container:
        # lidarr mounts the NFS data root at /data, soularr mounts
        # data/soulseek at /downloads.
        config.ini: |
          [Lidarr]
          api_key = {{ .LIDARR_API_KEY }}
          host_url = http://lidarr.media.svc.cluster.local:8686
          download_dir = /data/soulseek/complete
          disable_sync = False

          [Slskd]
          api_key = {{ .SLSKD_API_KEY }}
          host_url = http://slskd.downloads.svc.cluster.local:5030
          url_base = /
          download_dir = /downloads/complete
          delete_searches = True
          stalled_timeout = 3600

          [Release Settings]
          use_most_common_tracknum = True
          allow_multi_disc = True
          accepted_countries = Europe,Japan,United Kingdom,United States,[Worldwide],Australia,Canada
          accepted_formats = CD,Digital Media,Vinyl

          [Search Settings]
          # ms; slskd keeps each search open this long collecting responses.
          # 5000 misses slow-arriving responses over the VPN -> 0-result runs.
          search_timeout = 15000
          maximum_peer_queue = 50
          minimum_peer_upload_speed = 0
          minimum_filename_match_ratio = 0.8
          minimum_search_interval = 5
          allowed_filetypes = flac 24/192,flac 16/44.1,flac,mp3 320,mp3
          album_prepend_artist = False
          search_type = incrementing_page
          number_of_albums_to_grab = 10
          remove_wanted_on_failure = False
          search_source = missing
          failed_import_denylist = True

          [Download Settings]
          download_filtering = True

          [Logging]
          level = INFO
          format = [%(levelname)s|%(module)s|L%(lineno)d] %(asctime)s: %(message)s
          datefmt = %Y-%m-%dT%H:%M:%S%z
          # log_to_file feeds the web UI's activity view
          log_to_file = True
          log_file = soularr.log
          max_bytes = 1048576
          backup_count = 3
  dataFrom:
    - extract:
        key: lidarr
    - extract:
        key: slskd
