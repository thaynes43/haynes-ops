---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: slskd
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: slskd-secret
    template:
      engineVersion: v2
      data:
        # Soulseek network identity (public, so pinned here, not in 1P).
        # NOT manofoz: that name is contested by someone else's client on
        # the network, and Soulseek's no-registration model means the two
        # sessions kick each other in a loop (resets every ~30-60s).
        SLSKD_SLSK_USERNAME: "hynsk8s-x3t9q"
        SLSKD_SLSK_PASSWORD: "{{ .SLSKD_SLSK_PASSWORD }}"
        # Web UI login
        SLSKD_USERNAME: "{{ .SLSKD_USERNAME }}"
        SLSKD_PASSWORD: "{{ .SLSKD_PASSWORD }}"
        # Primary API key (Administrator role) — shared with soularr
        SLSKD_API_KEY: "{{ .SLSKD_API_KEY }}"
  dataFrom:
    - extract:
        key: slskd
