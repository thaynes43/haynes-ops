---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: unpoller
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      unpoller:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/unpoller/unpoller
              tag: v3.3.0
            env:
              TZ: America/New_York
              UP_POLLER_DEBUG: "false"
              # Outputs: Prometheus pull on :9130, InfluxDB disabled.
              UP_INFLUXDB_DISABLE: "true"
              UP_PROMETHEUS_DISABLE: "false"
              UP_PROMETHEUS_HTTP_LISTEN: "0.0.0.0:9130"
              # Controller poll behaviour. Self-signed UniFi cert -> skip verify.
              UP_UNIFI_DEFAULT_VERIFY_SSL: "false"
              UP_UNIFI_DEFAULT_SAVE_SITES: "true"
              # UDM SE controller address (RFC1918, not a secret).
              UP_UNIFI_DEFAULT_URL: "https://192.168.0.1"
            # UP_UNIFI_DEFAULT_USER / _PASS come from the ExternalSecret.
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: &port 9130
                  initialDelaySeconds: 15
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                memory: 256Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile: { type: RuntimeDefault }
    service:
      app:
        ports:
          metrics:
            port: *port
    serviceMonitor:
      app:
        endpoints:
          - port: metrics
            interval: 1m
            scrapeTimeout: 30s
    persistence:
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
