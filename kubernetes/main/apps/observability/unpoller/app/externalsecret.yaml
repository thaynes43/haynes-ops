---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: unpoller
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: unpoller-secret
    template:
      engineVersion: v2
      data:
        # Read-only UniFi "Limited Admin" local user (NOT the Ubiquiti SSO login,
        # NOT the new API key). Sourced from the 1Password "unifi-poller" item:
        #   url      -> full controller URL incl. port, e.g. https://10.0.0.1:443
        #   username -> the read-only local user
        #   password -> its password
        UP_UNIFI_DEFAULT_URL: "{{ .url }}"
        UP_UNIFI_DEFAULT_USER: "{{ .username }}"
        UP_UNIFI_DEFAULT_PASS: "{{ .password }}"
  dataFrom:
    - extract:
        key: unifi-poller
