---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: unpoller
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: unpoller-secret
    template:
      engineVersion: v2
      data:
        # Read-only UniFi "Limited Admin" local user (NOT the Ubiquiti SSO login,
        # NOT the new API key). Only username/password are secret — the controller
        # URL is a plain RFC1918 address set in the HelmRelease. Sourced from the
        # 1Password "unifi-poller" item's login username/password fields.
        UP_UNIFI_DEFAULT_USER: "{{ .username }}"
        UP_UNIFI_DEFAULT_PASS: "{{ .password }}"
  dataFrom:
    - extract:
        key: unifi-poller
