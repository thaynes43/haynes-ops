---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: grafana-admin-secret
    template:
      engineVersion: v2
      data:
        admin-user: "{{ .GRAFANA_ADMIN_USERNAME }}"
        admin-password: "{{ .GRAFANA_ADMIN_PASSWORD }}"
  dataFrom:
    - extract:
        key: grafana
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-authentik
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: grafana-authentik-secret
    template:
      engineVersion: v2
      data:
        GF_AUTH_GENERIC_OAUTH_CLIENT_ID: "{{ .GF_AUTH_GENERIC_OAUTH_CLIENT_ID }}"
        GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET: "{{ .GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET }}"
  dataFrom:
    - extract:
        key: grafana-authentik
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-postgres
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: grafana-postgres-secret
    template:
      engineVersion: v2
      data:
        # Grafana -> external Postgres (cluster16). GF_DATABASE_* override
        # grafana.ini so Grafana stores its DB (incl. service accounts/tokens)
        # in Postgres instead of ephemeral SQLite.
        GF_DATABASE_TYPE: postgres
        GF_DATABASE_HOST: postgres16-rw.database.svc.cluster.local:5432
        GF_DATABASE_NAME: &dbName grafana
        GF_DATABASE_USER: &dbUser "{{ .GRAFANA_POSTGRESQL__USER }}"
        GF_DATABASE_PASSWORD: &dbPass "{{ .GRAFANA_POSTGRESQL__PASSWORD }}"
        GF_DATABASE_SSL_MODE: disable
        # postgres-init bootstrap (creates DB + role idempotently on pod start;
        # same INIT_POSTGRES_* contract as authentik / paperless / todos).
        INIT_POSTGRES_DBNAME: *dbName
        INIT_POSTGRES_HOST: postgres16-rw.database.svc.cluster.local
        INIT_POSTGRES_USER: *dbUser
        INIT_POSTGRES_PASS: *dbPass
        INIT_POSTGRES_SUPER_PASS: "{{ .POSTGRES_SUPER_PASS }}"
  dataFrom:
    - extract:
        key: grafana
    - extract:
        key: cloudnative-pg
