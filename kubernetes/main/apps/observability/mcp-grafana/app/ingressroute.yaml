---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: mcp-grafana
  annotations:
    external-dns.alpha.kubernetes.io/target: internal.haynesops
    kubernetes.io/ingress.class: traefik-internal
    # No siteMonitor: mcp-grafana exposes MCP/SSE only, no HTTP GET / that returns 200
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`mcp-grafana.haynesops.com`) && PathPrefix(`/`)
      services:
        - kind: Service
          name: mcp-grafana
          port: 8000
      middlewares:
        - name: default-headers
          namespace: network
  tls:
    secretName: certificate-haynesops
