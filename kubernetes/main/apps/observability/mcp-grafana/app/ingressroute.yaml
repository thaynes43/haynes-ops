---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: mcp-grafana
  annotations:
    external-dns.alpha.kubernetes.io/target: internal.haynesops
    kubernetes.io/ingress.class: traefik-internal
    # streamable-http MCP endpoint is served at /mcp; health checks are available at /healthz
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`mcp-grafana.haynesops.com`) && PathPrefix(`/`)
      services:
        - kind: Service
          name: mcp-grafana
          port: 8000
      middlewares:
        - name: default-headers
          namespace: network
  tls:
    secretName: certificate-haynesops
