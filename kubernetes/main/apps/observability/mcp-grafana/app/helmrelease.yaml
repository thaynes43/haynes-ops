---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mcp-grafana
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      mcp-grafana:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: grafana/mcp-grafana
              tag: 0.11.3
            env:
              GRAFANA_URL: http://grafana.observability.svc.cluster.local
            envFrom:
              - secretRef:
                  name: mcp-grafana-secret
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
    service:
      app:
        controller: mcp-grafana
        ports:
          http:
            port: 8000
    persistence:
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
