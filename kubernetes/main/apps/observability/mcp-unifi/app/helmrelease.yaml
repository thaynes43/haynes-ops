---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mcp-unifi
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      mcp-unifi:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/enuno/unifi-mcp-server
              tag: 0.2.6
            env:
              # Local UDM SE controller (not the cloud Site Manager API).
              UNIFI_API_TYPE: local
              UNIFI_LOCAL_HOST: 192.168.0.1
              UNIFI_LOCAL_PORT: "443"
              UNIFI_LOCAL_VERIFY_SSL: "false"
              UNIFI_DEFAULT_SITE: default
              # Networked MCP service over SSE (endpoint path /sse), reachable
              # via the internal IngressRoute so the session connects by URL.
              MCP_SERVER_TRANSPORT: sse
              MCP_SERVER_HOST: 0.0.0.0
              MCP_SERVER_PORT: "3000"
            # UNIFI_API_KEY comes from the ExternalSecret.
            envFrom:
              - secretRef:
                  name: mcp-unifi-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 3000
                  initialDelaySeconds: 15
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 25m
                memory: 128Mi
              limits:
                memory: 256Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile: { type: RuntimeDefault }
    service:
      app:
        controller: mcp-unifi
        ports:
          http:
            port: 3000
    persistence:
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
