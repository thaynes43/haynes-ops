---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mcp-unifi
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: mcp-unifi-secret
    template:
      engineVersion: v2
      data:
        # Official UniFi API key. enuno has no read-only flag, so create this key
        # under a READ-ONLY admin (e.g. the unifi-poller Limited Admin) — then any
        # mutating call fails at the controller. From 1Password "unifi-mcp" item.
        UNIFI_API_KEY: "{{ .UNIFI_API_KEY }}"
  dataFrom:
    - extract:
        key: unifi-mcp
