---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: mcp-unifi
  annotations:
    external-dns.alpha.kubernetes.io/target: internal.haynesops
    kubernetes.io/ingress.class: traefik-internal
    # SSE MCP endpoint is served at /sse
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`mcp-unifi.haynesops.com`) && PathPrefix(`/`)
      services:
        - kind: Service
          name: mcp-unifi
          port: 3000
      middlewares:
        - name: default-headers
          namespace: network
  tls:
    secretName: certificate-haynesops
