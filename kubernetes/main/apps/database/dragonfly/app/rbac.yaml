---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dragonfly-operator
rules:
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]

  # configmaps added 2026-06-15 for operator v1.6.x: it now lists/watches
  # ConfigMaps (custom-probes feature, upstream PR #500). We hand-maintain this
  # ClusterRole (app-template, not the upstream chart), so we mirror the
  # configmap role that upstream v1.6.1 added (its "missing configmap role" fix).
  - apiGroups: [""]
    resources: ["configmaps", "pods", "services"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]

  - apiGroups: [""]
    resources: ["pods/status"]
    verbs: ["get", "patch", "update"]

  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]

  - apiGroups: ["dragonflydb.io"]
    resources: ["dragonflies"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]

  - apiGroups: ["dragonflydb.io"]
    resources: ["dragonflies/finalizers"]
    verbs: ["update"]

  - apiGroups: ["dragonflydb.io"]
    resources: ["dragonflies/status"]
    verbs: ["get", "patch", "update"]

  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]

  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]

  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dragonfly-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: dragonfly-operator
subjects:
  - kind: ServiceAccount
    name: dragonfly-operator
    namespace: database