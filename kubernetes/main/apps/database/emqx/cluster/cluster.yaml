---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/apps.emqx.io/emqx_v2beta1.json
apiVersion: apps.emqx.io/v2beta1
kind: EMQX
metadata:
  name: emqx
spec:
  # Pinned to 6.2.0 — DO NOT bump until upstream fixes this.
  # EMQX 6.2.1 crash-loops at boot: the emqx_license app aborts with
  # "SINGLE_NODE_LICENSE, make sure this node and peer nodes are configured with
  # a valid license". That is the built-in COMMUNITY (single-node, FREE) license
  # failing to start — NOT a demand for a paid license. Single-node is license-
  # free under EMQX's BSL Additional Use Grant; 6.2.0 honors it, 6.2.1 aborts
  # (likely a boot-time community-license gate — cf. emqx#17530, which moved a
  # similar gate out of app boot for 6.2.2). Filed upstream: emqx/emqx#17600.
  # Watch 6.2.2 — it may fix this. Rolled back 2026-06-15 (PR #1841).
  image: docker.io/emqx/emqx:6.2.0
  config:
    data: |
      mqtt {
        max_packet_size = 256MB
      }
      retainer {
        max_payload_size = 4MB
        backend {
          type = built_in_database
          storage_type = disc
        }
      }
      authentication {
        backend = "built_in_database"
        mechanism = "password_based"
        password_hash_algorithm {
            name = "bcrypt"
        }
        user_id_type = "username"
        bootstrap_file = "/opt/init-user.json"
        bootstrap_type = "plain"
      }
      authorization {
        sources = [
          {
            type = built_in_database
            enable = true
          }
        ]
        no_match: "deny"
      }
  coreTemplate:
    metadata:
      annotations:
        reloader.stakater.com/auto: "true"
    spec:
      replicas: 1
      envFrom:
        - secretRef:
            name: emqx-secret
      extraVolumeMounts:
        - name: init-user
          mountPath: /opt/init-user.json
          subPath: init-user.json
          readOnly: true
      extraVolumes:
        - name: init-user
          secret:
            secretName: emqx-init-user-secret
      volumeClaimTemplates:
        accessModes: [ReadWriteOnce]
        storageClassName: ceph-block
        resources:
          requests:
            storage: 8Gi
  listenersServiceTemplate:
    metadata:
      annotations:
        lbipam.cilium.io/ips: 192.168.40.205
    spec:
      type: LoadBalancer
