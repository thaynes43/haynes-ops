---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/apps.emqx.io/emqx_v2beta1.json
apiVersion: apps.emqx.io/v2beta1
kind: EMQX
metadata:
  name: emqx
spec:
  # Pinned to 6.2.0: EMQX 6.2.1 (Enterprise) hard-fails startup with
  # "SINGLE_NODE_LICENSE ... configured with a valid license" — the license
  # check 6.2.0 did not enforce. The new pod crash-loops; do NOT bump to 6.2.x
  # until a license path is decided. Rolled back 2026-06-15 (PR #1841).
  image: docker.io/emqx/emqx:6.2.0
  config:
    data: |
      mqtt {
        max_packet_size = 256MB
      }
      retainer {
        max_payload_size = 4MB
        backend {
          type = built_in_database
          storage_type = disc
        }
      }
      authentication {
        backend = "built_in_database"
        mechanism = "password_based"
        password_hash_algorithm {
            name = "bcrypt"
        }
        user_id_type = "username"
        bootstrap_file = "/opt/init-user.json"
        bootstrap_type = "plain"
      }
      authorization {
        sources = [
          {
            type = built_in_database
            enable = true
          }
        ]
        no_match: "deny"
      }
  coreTemplate:
    metadata:
      annotations:
        reloader.stakater.com/auto: "true"
    spec:
      replicas: 1
      envFrom:
        - secretRef:
            name: emqx-secret
      extraVolumeMounts:
        - name: init-user
          mountPath: /opt/init-user.json
          subPath: init-user.json
          readOnly: true
      extraVolumes:
        - name: init-user
          secret:
            secretName: emqx-init-user-secret
      volumeClaimTemplates:
        accessModes: [ReadWriteOnce]
        storageClassName: ceph-block
        resources:
          requests:
            storage: 8Gi
  listenersServiceTemplate:
    metadata:
      annotations:
        lbipam.cilium.io/ips: 192.168.40.205
    spec:
      type: LoadBalancer
