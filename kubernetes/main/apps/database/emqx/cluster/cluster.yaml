---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/apps.emqx.io/emqx_v2beta1.json
apiVersion: apps.emqx.io/v2beta1
kind: EMQX
metadata:
  name: emqx
spec:
  # Pinned to 6.2.0 — HELD, do not bump. 6.2.1+ crash-loops at boot with
  # SINGLE_NODE_LICENSE: the built-in single-node COMMUNITY (free) license aborts
  # emqx_license. Root cause is NOT the broker (and NOT 6.2.2, the earlier theory)
  # — it's the emqx-OPERATOR blue-green upgrade forming a transient 2-node cluster
  # that the single-node license rejects (maintainer-confirmed, emqx/emqx#17600).
  # Fix = emqx-operator 3.0.0; lift this pin only AFTER the operator is on 3.0.0.
  # Enforced + fully reasoned in .renovate/holds.json5. Rolled back 2026-06-15 (#1841).
  image: docker.io/emqx/emqx:6.2.0
  config:
    data: |
      mqtt {
        max_packet_size = 256MB
      }
      retainer {
        max_payload_size = 4MB
        backend {
          type = built_in_database
          storage_type = disc
        }
      }
      authentication {
        backend = "built_in_database"
        mechanism = "password_based"
        password_hash_algorithm {
            name = "bcrypt"
        }
        user_id_type = "username"
        bootstrap_file = "/opt/init-user.json"
        bootstrap_type = "plain"
      }
      authorization {
        sources = [
          {
            type = built_in_database
            enable = true
          }
        ]
        no_match: "deny"
      }
  coreTemplate:
    metadata:
      annotations:
        reloader.stakater.com/auto: "true"
    spec:
      replicas: 1
      envFrom:
        - secretRef:
            name: emqx-secret
      extraVolumeMounts:
        - name: init-user
          mountPath: /opt/init-user.json
          subPath: init-user.json
          readOnly: true
      extraVolumes:
        - name: init-user
          secret:
            secretName: emqx-init-user-secret
      volumeClaimTemplates:
        accessModes: [ReadWriteOnce]
        storageClassName: ceph-block
        resources:
          requests:
            storage: 8Gi
  listenersServiceTemplate:
    metadata:
      annotations:
        lbipam.cilium.io/ips: 192.168.40.205
    spec:
      type: LoadBalancer
