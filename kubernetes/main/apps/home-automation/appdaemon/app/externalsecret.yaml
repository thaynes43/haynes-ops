---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: appdaemon
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: appdaemon-secret
    template:
      engineVersion: v2
      data:
        TOKEN: "{{ .TOKEN }}"
        OPENAPI_TOKEN: "{{ .OPENAPI_TOKEN }}"
        HA_URL: "http://home-assistant.home-automation.svc.cluster.local:8123"
        MEDIA_FS_ROOT: "{{ .MEDIA_FS_ROOT }}"
        IMMICH_URL: "http://immich-server.photos.svc.cluster.local:2283"
        OLLAMA_URL: "http://ollama-assist02.ai.svc.cluster.local:11434"
        COMFYUI_URL: "http://comfyui.ai.svc.cluster.local:8188"
        IMMICH_API_KEY: "{{ .IMMICH_API_KEY }}"
        GEMINI_API_KEY: "{{ .GEMINI_API_KEY }}"
        VESTABOARD_IP: "{{ .VESTABOARD_IP }}"
        VESTABOARD_API_KEY: "{{ .VESTABOARD_API_KEY }}"
        MQTT_HOST: "{{ .MQTT_HOST }}"
        MQTT_USER: "{{ .MQTT_USER }}"
        MQTT_PASSWORD: "{{ .MQTT_PASSWORD }}"
        secrets.yaml: |
          ha_url: "http://home-assistant.home-automation.svc.cluster.local:8123"
          token: "{{ .TOKEN }}"
          mqtt_host: "{{ .MQTT_HOST }}"
          mqtt_user: "{{ .MQTT_USER }}"
          mqtt_password: "{{ .MQTT_PASSWORD }}"
        appdaemon.yaml: |
          appdaemon:
            time_zone: America/New_York
            latitude: 0
            longitude: 0
            elevation: 0

            plugins:
              HASS:
                type: hass
                ha_url: !secret ha_url
                token: !secret token
                ws_max_msg_size: 8388608
                ws_timeout: 60

          http:
            url: http://0.0.0.0:5050

          api:
          admin:
  dataFrom:
    - extract:
        key: appdaemon
