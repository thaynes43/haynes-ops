---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: appdaemon
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: appdaemon-secret
    template:
      engineVersion: v2
      data:
        TOKEN: "{{ .TOKEN }}"
        SSH_PUBLIC_KEY: "{{ .SSH_PUBLIC_KEY }}"
        OPENAPI_TOKEN: "{{ .OPENAPI_TOKEN }}"
        MEDIA_FS_ROOT: "{{ .MEDIA_FS_ROOT }}"
        secrets.yaml: |
          token: "{{ .TOKEN }}"
          openapi_token: "{{ .OPENAPI_TOKEN }}"
          media_fs_root: "{{ .MEDIA_FS_ROOT }}"
        appdaemon.yaml: |
          appdaemon:
            time_zone: America/New_York
            latitude: 0
            longitude: 0
            elevation: 0

            plugins:
              HASS:
                type: hass
                ha_url: http://home-assistant.home-automation.svc.cluster.local:8123
                token: !secret token
                ws_max_msg_size: 8388608
                ws_timeout: 60

          http:
            url: http://0.0.0.0:5050

          api:
          admin:
  dataFrom:
    - extract:
        key: appdaemon
