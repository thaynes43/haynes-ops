---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: appdaemon
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      appdaemon:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/thaynes43/appdaemon
              tag: 0.4.4
            env:
              TZ: America/New_York
            envFrom:
              - secretRef:
                  name: appdaemon-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: &port 5050
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]
            resources:
              requests:
                cpu: 1
                memory: 2Gi
              limits:
                memory: 12Gi
    defaultPodOptions:
      securityContext:
        seccompProfile: { type: RuntimeDefault }
    service:
      app:
        controller: appdaemon
        ports:
          http:
            port: *port
    persistence:
      config:
        type: emptyDir
        globalMounts:
          - path: /conf
      appdaemon-config:
        type: secret
        name: appdaemon-secret
        globalMounts:
          - path: /conf/appdaemon.yaml
            subPath: appdaemon.yaml
            readOnly: true
          - path: /conf/secrets.yaml
            subPath: secrets.yaml
            readOnly: true
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
      nfs-share:
        type: nfs
        server: gasha01.haynesnetwork
        path: /hdd-nfs-repl
        globalMounts:
          - path: /media
            subPath: misc/hass-media
