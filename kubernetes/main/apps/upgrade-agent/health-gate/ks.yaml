---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app upgrade-health-gate
  namespace: upgrade-agent
spec:
  targetNamespace: upgrade-agent
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: external-secrets-stores
      namespace: external-secrets
  path: ./kubernetes/main/apps/upgrade-agent/health-gate/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: haynes-ops
    namespace: flux-system
  wait: true
  interval: 30m
  timeout: 5m
  # NO postBuild.substitute: Flux envsubst was rewriting the shell `${VAR:-default}`
  # in gate.sh — emptying `${HASS_TOKEN:-}` (silently disabling the HA check) and
  # hardcoding the other defaults (killing the env overrides). These manifests use
  # YAML anchors, not `${APP}`, so no substitution is needed.
