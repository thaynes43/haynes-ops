kind: Machine
systemExtensions:
  - siderolabs/qemu-guest-agent
  - siderolabs/i915
name: 960513a6-7a1d-4ece-949d-54a022fe85e5
patches:
  - idOverride: 400-cm-960513a6-7a1d-4ece-949d-54a022fe85e5
    inline:
      machine:
        install:
          extraKernelArgs:
            - net.ifnames=0
            - module_blacklist=xe
          wipe: true
        kernel:
          modules:
            - name: i915
              parameters:
                - enable_guc=3
        udev:
          rules:
            - SUBSYSTEM=="drm", KERNEL=="renderD*", GROUP="44", MODE="0660"
        network:
          hostname: talosw03
          interfaces:
            - deviceSelector:
                hardwareAddr: bc:24:11:c5:5b:92
              mtu: 1500
              dhcp: true
              dhcpOptions:
                # CANARY (talosw03 only): rely purely on routeMetric like the
                # control planes do, with NO static `routes:` default override.
                # On 1.12.8 the control planes honor routeMetric (their 4 NIC
                # defaults sit at distinct metrics and mgmt@100 wins). The static
                # default route previously added here appears to poison DHCP
                # routeMetric node-wide: with it present, BOTH NICs' defaults fall
                # back to metric 1024 and collide, so eth1/VPN can win the race.
                # Removing it should let eth0@100 beat eth1@2000. Validate on w03
                # before replicating to w01/w02.
                routeMetric: 100
            - deviceSelector:
                hardwareAddr: bc:24:11:5a:b3:3a
              mtu: 1500
              # eth1 = .30 VPN macvlan parent (qbittorrent). Static, NO gateway —
              # see talosw01 for rationale (routeMetric ignored on VM workers).
              dhcp: false
              addresses:
                - 192.168.30.103/24
          nameservers:
            - 192.168.40.1
          disableSearchDomain: true
        sysctls:
          user.max_user_namespaces: "11255"
          kernel.kexec_load_disabled: "1"
          net.core.bpf_jit_harden: 1
          fs.inotify.max_queued_events: "65536"
          fs.inotify.max_user_instances: "8192"
          fs.inotify.max_user_watches: "524288"
          net.core.rmem_max: "7500000"
          net.core.wmem_max: "7500000"
        kubelet:
          extraArgs:
            rotate-server-certificates: "true"
          defaultRuntimeSeccompProfileEnabled: true
          nodeIP:
            validSubnets:
              - 192.168.40.0/24
          disableManifestsDirectory: true
          extraMounts:
            - destination: /var/openebs/local
              type: bind
              source: /var/openebs/local
              options:
                - bind
                - rshared
                - rw
        files:
            - op: create
              path: /etc/cri/conf.d/20-customization.part
              content: |
                [plugins."io.containerd.grpc.v1.cri"]
                  enable_unprivileged_ports = true
                  enable_unprivileged_icmp = true
                [plugins."io.containerd.grpc.v1.cri".containerd]
                  discard_unpacked_layers = false
                [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runc]
                  discard_unpacked_layers = false

            - op: overwrite
              path: /etc/nfsmount.conf
              permissions: 0o644
              content: |
                [ NFSMount_Global_Options ]
                nfsvers=4.2
                hard=True
                noatime=True
                nodiratime=True
                rsize=131072
                wsize=131072
                nconnect=8

        features:
            rbac: true
            stableHostname: true
            apidCheckExtKeyUsage: true
            diskQuotaSupport: true
            kubePrism:
                enabled: true
                port: 7445
            hostDNS:
                enabled: true
                resolveMemberNames: true
                forwardKubeDNSToHost: false
        nodeLabels:
            topology.kubernetes.io/region: main
            topology.kubernetes.io/zone: w
            network.haynesops.com/vpn: "true"
            intel.feature.node.kubernetes.io/gpu: "true"
