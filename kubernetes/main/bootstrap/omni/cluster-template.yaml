name: 83596797-0281-4927-94fb-f34bb869b1de
patches:
  - idOverride: 400-cm-83596797-0281-4927-94fb-f34bb869b1de
    inline:
      machine:
        install:
          extraKernelArgs:
            - net.ifnames=0
          wipe: true
        kernel:
          modules:
            - name: nvidia
              parameters:
                - NVreg_OpenRmEnableUnsupportedGpus=1
            - name: nvidia_uvm
            - name: nvidia_drm
            - name: nvidia_modeset
        network:
          hostname: talosw01
          interfaces:
            - deviceSelector:
                hardwareAddr: bc:24:11:83:72:d2
              mtu: 1500
              dhcp: true
              dhcpOptions:
                routeMetric: 100
              # (Removed the static metric-100 default-route override: it never
              # installed and gave no protection — both routeMetric and static
              # route metric are ignored on these VM/virtio workers. The real fix
              # is handled at eth1 — see commit history.)
            - deviceSelector:
                hardwareAddr: bc:24:11:3e:ca:00
              mtu: 1500
              # eth1 = .30 VPN macvlan parent (qbittorrent). Static, NO gateway:
              # routeMetric is ignored on these VM/virtio workers, so a DHCP
              # default here wins the metric-1024 race and steals node egress
              # (the talosw03 symptom). Static + no-gateway keeps eth1 up for
              # Multus while guaranteeing eth0 owns the default route. The UniFi
              # .30 DHCP stays on for everything else; only the hosts opt out.
              dhcp: false
              addresses:
                - 192.168.30.101/24
          nameservers:
            - 192.168.40.1
          disableSearchDomain: true
        sysctls:
          user.max_user_namespaces: "11255"
          net.core.bpf_jit_harden: 1
          fs.inotify.max_queued_events: "65536"
          fs.inotify.max_user_instances: "8192"
          fs.inotify.max_user_watches: "524288"
          net.core.rmem_max: "7500000"
          net.core.wmem_max: "7500000"
        kubelet:
          extraArgs:
            rotate-server-certificates: "true"
          defaultRuntimeSeccompProfileEnabled: true
          nodeIP:
            validSubnets:
              - 192.168.40.0/24
          disableManifestsDirectory: true
          extraMounts:
            - destination: /var/openebs/local
              type: bind
              source: /var/openebs/local
              options:
                - bind
                - rshared
                - rw
        files:
            - content: |
                [plugins."io.containerd.grpc.v1.cri"]
                  enable_unprivileged_ports = true
                  enable_unprivileged_icmp = true
                [plugins."io.containerd.grpc.v1.cri".containerd]
                  discard_unpacked_layers = false
                [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runc]
                  discard_unpacked_layers = false
              permissions: 0
              path: /etc/cri/conf.d/20-customization.part
              op: create
            - content: |
                [ NFSMount_Global_Options ]
                nfsvers=4.2
                hard=True
                noatime=True
                nodiratime=True
                rsize=131072
                wsize=131072
                nconnect=8
              permissions: 420
              path: /etc/nfsmount.conf
              op: overwrite
        features:
            rbac: true
            stableHostname: true
            apidCheckExtKeyUsage: true
            diskQuotaSupport: true
            kubePrism:
                enabled: true
                port: 7445
            hostDNS:
                enabled: true
                resolveMemberNames: true
                forwardKubeDNSToHost: false
        nodeLabels:
            topology.kubernetes.io/region: main
            topology.kubernetes.io/zone: w
            network.haynesops.com/vpn: "true"
