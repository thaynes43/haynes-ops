---
# yaml-language-server: $schema=https://gist.githubusercontent.com/thaynes43/21ef53eace2d3c6c8f00c8ee0fe4ec24/raw/b0fd8341723eee62b8a47127d40cb75f00056b67/empty-json-schema.json
# Durable self-heal for recurring VolSync restic stale locks: when a mover dies
# mid-prune it orphans a repo lock that blocks every subsequent forget/prune
# (-> VolSyncVolumeOutOfSync, crash-looping volsync-src pods, manual unlock).
# `restic unlock` WITHOUT --remove-all removes ONLY stale locks (dead process /
# >30m old) and is safe to run anytime — it never touches a live mover's
# refreshed lock. Runs ~15m before the 00:00 backup window so an orphaned lock is
# cleared before the next backup's prune. Uses the same per-app repo secret as the
# mover (envFrom -> RESTIC_REPOSITORY / RESTIC_PASSWORD / AWS creds).
apiVersion: batch/v1
kind: CronJob
metadata:
  name: "${APP}-volsync-unlock"
spec:
  schedule: "${VOLSYNC_UNLOCK_SCHEDULE:-45 23 * * *}"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: "${APP}-volsync-unlock"
        spec:
          restartPolicy: OnFailure
          automountServiceAccountToken: false
          securityContext:
            runAsNonRoot: true
            runAsUser: ${VOLSYNC_PUID:-568}
            runAsGroup: ${VOLSYNC_PGID:-568}
            fsGroup: ${VOLSYNC_PGID:-568}
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: unlock
              # No `# renovate:` hint here — Renovate's `kubernetes` manager already
              # tracks this image natively; a hint makes the regex manager track it
              # too and open duplicate PRs (see #1830 vs #1831).
              image: docker.io/restic/restic:0.19.0
              # `$$` is Flux's escape for a literal `$` (so the shell — not Flux's
              # postBuild substitution — expands these); `${APP}` IS substituted by Flux.
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -u
                  # Count repo locks BEFORE unlocking. This job runs when no backup is
                  # scheduled, so any lock present is an ORPHAN left by a mover killed
                  # mid-backup (VolSync's recurring immutable-Job-delete bug) — i.e. the
                  # issue actually recurred tonight.
                  n=$$(restic list locks --no-cache 2>/dev/null | wc -l | tr -d ' ')
                  # Remove stale locks (safe: never touches a live/refreshed lock).
                  restic unlock --no-cache || true
                  # If we just cleared an orphan, raise a self-resolving Alertmanager
                  # alert (-> Pushover) so the recurrence is recorded. Lets us measure how
                  # often the bug fires to narrow the RCA. Non-fatal if the POST fails.
                  if [ "$${n:-0}" -gt 0 ]; then
                    wget -q -O- --header='Content-Type: application/json' \
                      --post-data='[{"labels":{"alertname":"VolSyncStaleLockCleared","severity":"warning","app":"${APP}","job":"volsync-unlock"},"annotations":{"summary":"VolSync auto-cleared a stale restic lock for ${APP}: a mover was killed mid-backup (recurring immutable-Job-delete bug). Backup data is safe and prune is now unblocked; logged to track recurrence frequency for RCA."}}]' \
                      "http://kube-prometheus-stack-alertmanager.observability.svc.cluster.local:9093/api/v2/alerts" || true
                  fi
              envFrom:
                - secretRef:
                    name: "${APP}-volsync-aws-secret"
              env:
                - name: TMPDIR
                  value: /tmp
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              resources:
                requests:
                  cpu: 10m
                  memory: 64Mi
                limits:
                  memory: 256Mi
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: tmp
              emptyDir: {}
