---
# yaml-language-server: $schema=https://gist.githubusercontent.com/thaynes43/21ef53eace2d3c6c8f00c8ee0fe4ec24/raw/b0fd8341723eee62b8a47127d40cb75f00056b67/empty-json-schema.json
# See volsync/aws/unlock.yaml for rationale. Stale-only `restic unlock` (no
# --remove-all, safe anytime) that self-heals orphaned repo locks before the
# 00:00 backup window. Uses the per-extra-volume repo secret.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: "${EXTRAVOL}-volsync-unlock"
spec:
  schedule: "45 23 * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: "${EXTRAVOL}-volsync-unlock"
        spec:
          restartPolicy: OnFailure
          automountServiceAccountToken: false
          securityContext:
            runAsNonRoot: true
            runAsUser: ${VOLSYNC_PUID:-568}
            runAsGroup: ${VOLSYNC_PGID:-568}
            fsGroup: ${VOLSYNC_PGID:-568}
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: unlock
              # No `# renovate:` hint here — Renovate's `kubernetes` manager already
              # tracks this image natively; a hint makes the regex manager track it
              # too and open duplicate PRs (see #1830 vs #1831).
              # `$$` is Flux's escape for a literal `$`; `${EXTRAVOL}` IS substituted by Flux.
              image: docker.io/restic/restic:0.19.0
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -u
                  n=$$(restic list locks --no-cache 2>/dev/null | wc -l | tr -d ' ')
                  restic unlock --no-cache || true
                  if [ "$${n:-0}" -gt 0 ]; then
                    wget -q -O- --header='Content-Type: application/json' \
                      --post-data='[{"labels":{"alertname":"VolSyncStaleLockCleared","severity":"warning","app":"${EXTRAVOL}","job":"volsync-unlock"},"annotations":{"summary":"VolSync auto-cleared a stale restic lock for ${EXTRAVOL}: a mover was killed mid-backup (recurring immutable-Job-delete bug). Backup data is safe and prune is now unblocked; logged to track recurrence frequency for RCA."}}]' \
                      "http://kube-prometheus-stack-alertmanager.observability.svc.cluster.local:9093/api/v2/alerts" || true
                  fi
              envFrom:
                - secretRef:
                    name: "${EXTRAVOL}-volsync-aws-secret"
              env:
                - name: TMPDIR
                  value: /tmp
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              resources:
                requests:
                  cpu: 10m
                  memory: 64Mi
                limits:
                  memory: 256Mi
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: tmp
              emptyDir: {}
