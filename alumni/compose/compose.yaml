# Outline + Postgres + Redis + MinIO + Caddy
# All secrets read from /opt/outline/.env (populated by scripts/load-secrets.sh from Secret Manager).
# Bind mounts to /var/lib/outline/* so backups can tar the host paths directly.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: outline
      POSTGRES_DB: outline
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - /var/lib/outline/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U outline -d outline"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--save", "60", "1"]
    volumes:
      - /var/lib/outline/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: outline
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - /var/lib/outline/minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot: creates the uploads bucket + a non-root access key for Outline. Exits when done.
  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 outline $$MINIO_ROOT_PASSWORD &&
      mc mb --ignore-existing local/outline-uploads &&
      mc admin user svcacct add --access-key $$MINIO_ACCESS_KEY --secret-key $$MINIO_SECRET_KEY local outline 2>/dev/null || true &&
      echo 'bucket + svcacct ready'
      "
    restart: "no"

  outline:
    image: docker.getoutline.com/outlinewiki/outline:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      SECRET_KEY: ${SECRET_KEY}
      UTILS_SECRET: ${UTILS_SECRET}
      DATABASE_URL: postgres://outline:${POSTGRES_PASSWORD}@postgres:5432/outline
      PGSSLMODE: disable
      REDIS_URL: redis://default:${REDIS_PASSWORD}@redis:6379
      URL: https://wiki.sigoalumni.org
      PORT: "3000"
      FORCE_HTTPS: "false"          # Caddy terminates TLS; Outline speaks HTTP behind it
      ENABLE_UPDATES: "false"       # disable telemetry phone-home

      # S3-compatible storage → MinIO
      AWS_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY}
      AWS_REGION: us-east-1                       # MinIO ignores; Outline still requires it set
      AWS_S3_UPLOAD_BUCKET_URL: http://minio:9000
      AWS_S3_UPLOAD_BUCKET_NAME: outline-uploads
      AWS_S3_FORCE_PATH_STYLE: "true"
      AWS_S3_ACL: private

      # Auth — Google OAuth (Cloud Identity tenant)
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}

      DEFAULT_LANGUAGE: en_US

      # SMTP (optional — leave blank until configured)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - outline
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
