# Outline + Postgres + Redis + Caddy. Attachments live on the VM's local disk
# (FILE_STORAGE=local) at /var/lib/outline/files — backed up nightly to GCS via backup.sh.
# All secrets read from /opt/outline/.env (populated by scripts/load-secrets.sh from Secret Manager).
# Bind mounts to /var/lib/outline/* so backups can tar the host paths directly.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: outline
      POSTGRES_DB: outline
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - /var/lib/outline/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U outline -d outline"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--save", "60", "1"]
    volumes:
      - /var/lib/outline/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  outline:
    image: docker.getoutline.com/outlinewiki/outline:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - /var/lib/outline/files:/var/lib/outline/files
    environment:
      NODE_ENV: production
      SECRET_KEY: ${SECRET_KEY}
      UTILS_SECRET: ${UTILS_SECRET}
      DATABASE_URL: postgres://outline:${POSTGRES_PASSWORD}@postgres:5432/outline
      PGSSLMODE: disable
      REDIS_URL: redis://default:${REDIS_PASSWORD}@redis:6379
      URL: https://wiki.sigoalumni.org
      PORT: "3000"
      FORCE_HTTPS: "false"          # Caddy terminates TLS; Outline speaks HTTP behind it
      ENABLE_UPDATES: "false"       # disable telemetry phone-home

      # Local file storage on the VM. Files served by Outline through its own routes.
      # Backed up nightly via backup.sh (tar /var/lib/outline/files → GCS).
      FILE_STORAGE: local
      FILE_STORAGE_LOCAL_ROOT_DIR: /var/lib/outline/files

      # Auth — Google OAuth (Cloud Identity tenant)
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}

      DEFAULT_LANGUAGE: en_US

      # SMTP (optional — leave blank until configured)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - outline
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
